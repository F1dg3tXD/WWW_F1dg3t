<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Profile JSON Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="form" aria-label="JSON editor">
      <div class="row">
        <label for="timezoneSearch">Timezone</label>
        <input id="timezoneSearch" type="text" placeholder="Search timezone" />
        <div class="inline-group">
          <select id="timezoneSelect" size="1"></select>
          <button id="autoDetectBtn" type="button">Auto</button>
        </div>
      </div>

      <div class="row">
        <label for="locationSearch">Location</label>
        <input id="locationSearch" type="text" placeholder="Search location" />
        <select id="locationSelect" size="1"></select>
        <input id="locationCustomInput" type="text" placeholder="Or enter a custom location" />
      </div>

      <div class="row">
        <label for="whyInput">Why</label>
        <textarea id="whyInput" rows="2"></textarea>
      </div>

      <div class="row">
        <label for="whatInput">What</label>
        <textarea id="whatInput" rows="3"></textarea>
      </div>

      <details class="integration-settings">
        <summary>Save target settings</summary>
        <p class="hint">Use local API for filesystem writes, or GitHub API when hosted as a static site.</p>

        <div class="row">
          <label for="saveModeSelect">Save Mode</label>
          <select id="saveModeSelect">
            <option value="auto">Auto (API, then GitHub, then local backup)</option>
            <option value="api">Local API only (filesystem)</option>
            <option value="github">GitHub API only (static hosting)</option>
            <option value="local">Local browser storage only</option>
          </select>
        </div>

        <div class="row">
          <label for="githubRepoInput">GitHub Repo (owner/name)</label>
          <input id="githubRepoInput" type="text" placeholder="example: octocat/profile-status" />
        </div>

        <div class="row">
          <label for="githubBranchInput">GitHub Branch</label>
          <input id="githubBranchInput" type="text" placeholder="main" />
        </div>

        <div class="row">
          <label for="githubPathInput">File Path</label>
          <input id="githubPathInput" type="text" placeholder="data.json" />
        </div>

        <div class="row">
          <label for="githubTokenInput">GitHub Token</label>
          <input id="githubTokenInput" type="password" placeholder="Fine-grained PAT with Contents: Read/Write" autocomplete="off" />
        </div>
      </details>

      <p id="statusMsg" class="status" aria-live="polite"></p>

      <div class="actions">
        <button id="saveBtn" type="button">Save</button>
        <button id="copyBtn" type="button">Copy JSON</button>
        <button id="downloadBtn" type="button">Download</button>
      </div>
    </section>

    <section class="preview" aria-label="JSON preview">
      <pre id="jsonPreview" spellcheck="false"></pre>
    </section>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
