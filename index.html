<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Profile JSON Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="form" aria-label="JSON editor">
      <div class="row">
        <label for="timezoneSelect">Timezone</label>
        <div class="inline-group">
          <select id="timezoneSelect"></select>
          <button id="autoDetectBtn" type="button">Auto</button>
        </div>
      </div>

      <div class="row">
        <label for="locationSelect">Location</label>
        <select id="locationSelect"></select>
      </div>

      <div class="row">
        <label for="whyInput">Why</label>
        <textarea id="whyInput" rows="2"></textarea>
      </div>

      <div class="row">
        <label for="whatInput">What</label>
        <textarea id="whatInput" rows="3"></textarea>
      </div>

      <div class="actions">
        <button id="saveBtn" type="button">Save</button>
        <button id="copyBtn" type="button">Copy JSON</button>
        <button id="downloadBtn" type="button">Download</button>
      </div>
    </section>

    <section class="preview" aria-label="JSON preview">
      <pre id="jsonPreview" spellcheck="false"></pre>
    </section>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
